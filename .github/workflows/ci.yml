name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 安装前端依赖
        run: npm ci --prefix web

      - name: 检查前端类型并生成嵌入资源
        run: |
          npm run typecheck --prefix web
          npm run build --prefix web

      - name: 确认嵌入资源已同步
        run: git diff --exit-code -- internal/webui/dist

      - name: Go 测试与静态检查
        run: |
          go test ./...
          go vet ./...

      - name: 并发竞争检查
        run: go test -race ./internal/app ./internal/auth ./internal/configstore ./internal/dae ./internal/host

      - name: Linux 构建
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -o bin/kdae-panel ./cmd/kdae-panel
